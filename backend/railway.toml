# Backend Railway Configuration
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "src/**",
  "tickers/**",
  "package.json",
  "bun.lock",
  "Dockerfile",
  "tsconfig.json",
  "bunfig.toml",
  "railway.toml",
]

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
